name: Temporary lightweight translation tool

on:
  push:
    branches: [tmp-argos-build]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build lightweight standalone translator
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install ctranslate2 sentencepiece pyinstaller
          curl -L --fail --retry 3 \
            https://github.com/LibreTranslate/LibreTranslate-Models/raw/refs/heads/main/es_en.argosmodel \
            -o es_en.argosmodel
          cat > translate_cli.py <<'PY'
          import argparse
          import tempfile
          import zipfile
          from pathlib import Path
          import ctranslate2
          import sentencepiece as spm

          def main() -> int:
              ap = argparse.ArgumentParser()
              ap.add_argument('--model', required=True)
              ap.add_argument('--input', required=True)
              ap.add_argument('--output', required=True)
              ap.add_argument('--batch-size', type=int, default=64)
              args = ap.parse_args()
              work = Path(tempfile.mkdtemp(prefix='argos-model-'))
              with zipfile.ZipFile(args.model) as zf:
                  zf.extractall(work)
              roots = [p.parent for p in work.rglob('metadata.json')]
              root = roots[0] if roots else work
              model_dir = root / 'model'
              sp_path = root / 'sentencepiece.model'
              processor = spm.SentencePieceProcessor(model_file=str(sp_path))
              translator = ctranslate2.Translator(str(model_dir), device='cpu')
              lines = Path(args.input).read_text(encoding='utf-8').splitlines()
              out = [''] * len(lines)
              active = [(i, line) for i, line in enumerate(lines) if line.strip()]
              for start in range(0, len(active), args.batch_size):
                  block = active[start:start + args.batch_size]
                  src = [processor.encode(text, out_type=str) for _, text in block]
                  res = translator.translate_batch(src, beam_size=1, num_hypotheses=1)
                  for (idx, _), result in zip(block, res):
                      out[idx] = processor.decode(result.hypotheses[0])
              Path(args.output).write_text('\n'.join(out) + ('\n' if lines else ''), encoding='utf-8')
              return 0

          if __name__ == '__main__':
              raise SystemExit(main())
          PY
          pyinstaller --onefile --name argos-es-en-lite translate_cli.py
          mkdir artifact
          cp dist/argos-es-en-lite artifact/
          cp es_en.argosmodel artifact/
          sha256sum artifact/* > artifact/SHA256SUMS
      - name: Upload translator artifact
        uses: actions/upload-artifact@v4
        with:
          name: argos-es-en-lite
          path: artifact
          compression-level: 0
          retention-days: 1
